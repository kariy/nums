# dojo_e2e_settlement.toml — fresh settlement-layer world for e2e tests.
#
# Targeted at the settlement Katana spawned by tests/e2e/src/harness.rs
# (`KatanaNode::start_settlement`, port 5071). The settlement Katana forks
# Cartridge mainnet at `latest`, so real USDC / Ekubo router contracts are
# reachable. The Nums world itself is freshly migrated under a unique seed
# so it doesn't collide with the real mainnet world's storage.
#
# Migration notes:
#   - Settler is included; its dojo_init takes (piltover, katana_setup,
#     materializer). Because of the 3-way circular dependency between
#     Settler / Setup / Materializer the harness migrates with placeholder
#     katana_setup=0 and materializer=0, then patches them via
#     Settler.set_katana_setup / Settler.set_materializer (test-driven
#     setters added for this purpose).
#   - The mainnet Settler depends on Vault/Token/Treasury/Faucet living in
#     the same world. Those are deployed fresh here too.
#   - Faucet is the quote token by default. The harness will pre-fund the
#     Settler reserve via storage manipulation on forked USDC if it wants
#     to use the real USDC; for the burn_pct=0 path Settler.settle just
#     calls vault.pay using the in-world Faucet token.
#   - Vault.pay's PROVIDER_ROLE is granted to Setup at deploy time. The
#     harness post-migration grants PROVIDER_ROLE to Settler too via the
#     dev account that holds DEFAULT_ADMIN_ROLE on Vault.

[world]
name = "Nums"
seed = "nums-e2e-settlement-v1"
description = "Nums settlement-layer e2e test world (forked mainnet)"
website = "https://nums.gg"

[namespace]
default = "NUMS"

[env]
rpc_url = "http://127.0.0.1:5071"
account_address = "0x127fd5f1fe78a71f8bcd1fec63e3fe2f0486b6ecd5c86a0466c3a21fa5cfcec"
private_key = "0xc5b2fcab997346f3ea1c00b002ecf6f382c5f9c9659a3894eb783c5320f912"

[migration]
order_inits = [
  "NUMS-Token",
  "NUMS-Faucet",
  "NUMS-Setup",
  "NUMS-Play",
  "NUMS-Collection",
  "NUMS-Vault",
  "NUMS-Treasury",
  "NUMS-Settler",
]
skip_contracts = ["NUMS-Vrf"]
disable_multicall = true

[writers]
"NUMS" = ["NUMS-Setup", "NUMS-Play", "NUMS-Settler"]

[owners]
"NUMS" = ["NUMS-Collection", "NUMS-Vault", "NUMS-Faucet", "NUMS-Token", "NUMS-Treasury"]

[init_call_args]
"NUMS-Vault" = [
  "0x1", # open: true
  "0x0", # fee: 0 basis points
]
"NUMS-Governor" = []
"NUMS-Treasury" = [
  "0xe10",                                                              # min_delay: 1 hour
  "0x127fd5f1fe78a71f8bcd1fec63e3fe2f0486b6ecd5c86a0466c3a21fa5cfcec", # admin = dev account 0
]
"NUMS-Token" = [
  "0xD3C21BCECCEDA1000000",                                             # initial_supply: 1M NUMS
  "0x127fd5f1fe78a71f8bcd1fec63e3fe2f0486b6ecd5c86a0466c3a21fa5cfcec", # recipient = dev account 0
]
"NUMS-Faucet" = [
  "0x2540BE400",                                                        # initial_supply: 10K USDC
  "0x127fd5f1fe78a71f8bcd1fec63e3fe2f0486b6ecd5c86a0466c3a21fa5cfcec", # recipient = dev account 0
]
"NUMS-Setup" = [
  "0x0",                                                                # vrf_address: Option::Some prefix
  "0x127fd5f1fe78a71f8bcd1fec63e3fe2f0486b6ecd5c86a0466c3a21fa5cfcec", # vrf_address (placeholder; settlement-side Setup is unused)
  "0x1",                                                                # quote_address: Option::None — fall back to Faucet via DNS
  "0x127fd5f1fe78a71f8bcd1fec63e3fe2f0486b6ecd5c86a0466c3a21fa5cfcec", # team_address (dev account 0; Settler.settle's residual flows here)
  "0x0",                                                                # ekubo_router_address — irrelevant on settlement-side Setup; Settler reads its own Config from the same world though, so we use a real router address below via setter post-deploy if we exercise Ekubo
  "0x0",                                                                # ekubo_positions_address
  "0x1E8480",                                                           # entry_price: 2.000000 USDC
  "0xD3C21BCECCEDA1000000",                                             # target_supply: 1M NUMS
  "0x0",                                                                # burn_percentage: 0% (skip Ekubo path entirely)
  "0x32",                                                               # vault_percentage: 50%
  "0xA",                                                                # average_score: 10
  "0x0",                                                                # pool_fee — unused with burn_pct=0
  "0x0",                                                                # pool_tick_spacing
  "0x0",                                                                # pool_extension
  "0x127fd5f1fe78a71f8bcd1fec63e3fe2f0486b6ecd5c86a0466c3a21fa5cfcec", # bundle_allower (unused on settlement)
  "0x0",                                                                # bridge_settler — unused on settlement Setup
  "0x13d9ee239f33fea4f8785b9e3870ade909e20a9599ae7cd62c1c292b73af1b7", # usdc_bridge — placeholder (not used on settlement)
  "0x0",                                                                # bridge_messaging — unused on settlement Setup
  "0x0",                                                                # materializer — unused on settlement Setup
]
"NUMS-Settler" = [
  "0x0", # piltover_messaging — patched post-migration via setter (or set during test wire-up before settle())
  "0x0", # katana_setup        — patched post-migration via setter
  "0x0", # materializer        — patched post-migration via setter
]
