[workspace]
members = ["contracts"]
description = "Nums"
homepage = "https://github.com/cartridge-gg/nums"

[workspace.package]
version = "0.0.0"
edition = "2024_07"

[workspace.dependencies]
achievement = { git = "https://github.com/cartridge-gg/arcade", rev = "fc2e81c" }
collection = { git = "https://github.com/cartridge-gg/arcade", rev = "fc2e81c" }
bundle = { git = "https://github.com/cartridge-gg/arcade", rev = "fc2e81c" }
leaderboard = { git = "https://github.com/cartridge-gg/arcade", rev = "fc2e81c" }
merkledrop = { git = "https://github.com/cartridge-gg/arcade", rev = "fc2e81c" }
quest = { git = "https://github.com/cartridge-gg/arcade", rev = "fc2e81c" }
starterpack = { git = "https://github.com/cartridge-gg/arcade", rev = "fc2e81c" }
graffiti = { git = "https://github.com/bal7hazar/graffiti.git", rev = "e8b0854" }
ekubo = { git = "https://github.com/EkuboProtocol/starknet-contracts", rev = "cf2e95f" }
dojo = "1.8.0"
dojo_cairo_macros = "1.8.0"
dojo_cairo_test = "1.8.0"
openzeppelin = "3.0.0"
alexandria_encoding = "0.7.0"
starknet = "2.13.1"
cairo_test = "2.13.1"

[workspace.tool.fmt]
sort-module-level-items = true

[profile.slot]
[profile.mainnet]
[profile.sepolia]
# E2E integration test profiles (tests/e2e/). Both reference fresh worlds
# spun up by the harness on locally-running Katanas. See
# tests/e2e/README.md and dojo_e2eappchain.toml / dojo_e2esettlement.toml.
[profile.e2eappchain]
[profile.e2esettlement]

[tool.scarb]
allow-prebuilt-plugins = ["dojo_cairo_macros"]
