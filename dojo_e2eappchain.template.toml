# dojo_e2eappchain.template.toml — template rendered at test runtime.
#
# This profile is targeted at the appchain Katana spawned by the
# tests/e2e/ harness, port 5072. The appchain runs as `ChainSpec::Rollup`
# (started via `katana --chain <dir>`), which generates a NEW pre-funded
# account address every test run via `katana init rollup`. We can't ship
# a static profile with that address, so the harness reads the generated
# `address` and `private_key` out of `genesis.json` and renders this
# template into `dojo_e2eappchain.toml` at startup.
#
# DO NOT commit a fully-rendered `dojo_e2eappchain.toml`; the file is
# .gitignore'd. Only this template is checked in.
#
# Migration notes:
#   - The appchain world is fresh (no fork). Setup is deployed with
#     bridge_settler=0, usdc_bridge=<dev account 1 placeholder>, materializer=0.
#     The harness then patches bridge_settler/materializer via
#     Setup.set_bridge_settler / Setup.set_materializer after the settlement
#     world's Settler is migrated and the appchain Materializer is UDC-deployed.
#   - Faucet acts as the appchain's quote token (mock USDC). The harness
#     does NOT need real forked USDC on the appchain — only USDC on the
#     settlement layer (where Settler.settle pulls from its reserve).
#   - team_address, recipient and bundle_allower all point at the genesis
#     account.

[world]
name = "Nums"
seed = "nums-e2e-appchain-v1"
description = "Nums appchain e2e test world"
website = "https://nums.gg"

[namespace]
default = "NUMS"

[env]
rpc_url = "http://127.0.0.1:5072"
account_address = "{ACCOUNT_ADDRESS}"
private_key = "{PRIVATE_KEY}"

[migration]
order_inits = [
  "NUMS-Token",
  "NUMS-Faucet",
  "NUMS-Setup",
  "NUMS-Play",
  "NUMS-Collection",
  "NUMS-Vault",
  "NUMS-Treasury",
]
# Settler is settlement-only; skipped on the appchain world.
# Vrf mock is no-init; skipped here and Setup gets a placeholder VRF address.
skip_contracts = ["NUMS-Settler", "NUMS-Vrf"]
disable_multicall = true

[writers]
"NUMS" = ["NUMS-Setup", "NUMS-Play"]

[owners]
"NUMS" = ["NUMS-Collection", "NUMS-Vault", "NUMS-Faucet", "NUMS-Token", "NUMS-Treasury"]

[init_call_args]
"NUMS-Vault" = [
  "0x1", # open: true
  "0x0", # fee: 0 basis points
]
"NUMS-Governor" = []
"NUMS-Treasury" = [
  "0xe10",              # min_delay: 1 hour
  "{ACCOUNT_ADDRESS}",  # admin = genesis account
]
"NUMS-Token" = [
  "0xD3C21BCECCEDA1000000", # initial_supply: 1M NUMS
  "{ACCOUNT_ADDRESS}",      # recipient = genesis account
]
"NUMS-Faucet" = [
  "0x2540BE400",       # initial_supply: 10K USDC
  "{ACCOUNT_ADDRESS}", # recipient = genesis account
]
"NUMS-Setup" = [
  "0x0",                                                                # vrf_address: Option::Some prefix
  "{ACCOUNT_ADDRESS}",                                                  # vrf_address (placeholder — VRF skipped in this profile; Setup only stores it)
  "0x1",                                                                # quote_address: Option::None — fall back to Faucet via DNS
  "{ACCOUNT_ADDRESS}",                                                  # team_address
  "0x0",                                                                # ekubo_router_address — unused on appchain
  "0x0",                                                                # ekubo_positions_address — unused on appchain
  "0x1E8480",                                                           # entry_price: 2.000000 USDC
  "0xD3C21BCECCEDA1000000",                                             # target_supply: 1M NUMS
  "0x46",                                                               # burn_percentage: 70%
  "0x32",                                                               # vault_percentage: 50%
  "0xA",                                                                # average_score: 10
  "0x0",                                                                # pool_fee — unused
  "0x0",                                                                # pool_tick_spacing — unused
  "0x0",                                                                # pool_extension — unused
  "{ACCOUNT_ADDRESS}",                                                  # bundle_allower (genesis account; bundle.issue uses voucher signatures)
  "0x0",                                                                # bridge_settler — patched post-migration via setter
  "0x13d9ee239f33fea4f8785b9e3870ade909e20a9599ae7cd62c1c292b73af1b7", # usdc_bridge — placeholder (any non-zero non-self address; harness pre-funds this)
  "0x0",                                                                # bridge_messaging — appchain side does not use this; settlement side reads piltover_messaging directly
  "0x0",                                                                # materializer — patched post-migration via setter
]
