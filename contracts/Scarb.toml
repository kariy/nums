[package]
name = "nums"
version = "0.1.0"
cairo-version = "2.13.1"
edition = "2024_07"

[scripts]

[[target.starknet-contract]]
allowed-libfuncs-list.name = "experimental"
sierra = true
casm = true
build-external-contracts = [
  "dojo::world::world_contract::world",
  "openzeppelin::presets::account::AccountUpgradeable",
  "achievement::models::index::m_AchievementDefinition",
  "achievement::models::index::m_AchievementCompletion",
  "achievement::models::index::m_AchievementAdvancement",
  "achievement::models::index::m_AchievementAssociation",
  "achievement::events::index::e_TrophyCreation",
  "achievement::events::index::e_TrophyProgression",
  "achievement::events::index::e_AchievementCompleted",
  "achievement::events::index::e_AchievementClaimed",
  "quest::models::index::m_QuestDefinition",
  "quest::models::index::m_QuestCompletion",
  "quest::models::index::m_QuestAdvancement",
  "quest::models::index::m_QuestAssociation",
  "quest::models::index::m_QuestCondition",
  "quest::events::index::e_QuestCreation",
  "quest::events::index::e_QuestProgression",
  "quest::events::index::e_QuestUnlocked",
  "quest::events::index::e_QuestCompleted",
  "quest::events::index::e_QuestClaimed",
  "leaderboard::events::index::e_LeaderboardScore",
  "merkledrop::models::index::m_MerkleTree",
  "merkledrop::models::index::m_MerkleClaim",
  "merkledrop::events::index::e_MerkleProofs",
  "bundle::models::index::m_Bundle",
  "bundle::models::index::m_BundleIssuance",
  "bundle::models::index::m_BundleReferral",
  "bundle::models::index::m_BundleGroup",
  "bundle::models::index::m_BundleVoucher",
  "bundle::events::index::e_BundleRegistered",
  "bundle::events::index::e_BundleUpdated",
  "bundle::events::index::e_BundleIssued",
  "nums::models::index::m_PendingPurchase",
  "nums::models::index::m_BridgeNonce",
  "nums::events::index::e_PurchaseInitiated",
  "nums::events::index::e_PurchaseSettled",
  "nums::events::index::e_PurchaseCancelled",
  "nums::systems::materializer::Materializer",
]

[dependencies]
collection.workspace = true
achievement.workspace = true
quest.workspace = true
bundle.workspace = true
leaderboard.workspace = true
merkledrop.workspace = true
starterpack.workspace = true
graffiti.workspace = true
openzeppelin.workspace = true
alexandria_encoding.workspace = true
dojo.workspace = true
dojo_cairo_macros.workspace = true
starknet.workspace = true
ekubo.workspace = true

[dev-dependencies]
dojo_cairo_test.workspace = true
cairo_test.workspace = true

[features]
default = []
